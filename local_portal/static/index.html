<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RTK Buoy — Local</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0f1419; color: #e7ecf3; }
    header { padding: 1rem 1.25rem; border-bottom: 1px solid #2a3548; }
    h1 { margin: 0; font-size: 1.2rem; }
    .muted { color: #8b9cb3; font-size: 0.9rem; }
    main { max-width: 960px; margin: 0 auto; padding: 1rem; display: grid; gap: 1rem; }
    #map { height: 360px; border-radius: 8px; border: 1px solid #2a3548; }
    .card { background: #1a2332; border: 1px solid #2a3548; border-radius: 8px; padding: 1rem; }
    .row { display: flex; justify-content: space-between; padding: 0.3rem 0; border-bottom: 1px solid #243044; }
    .val { color: #3d9ee8; }
  </style>
</head>
<body>
  <header>
    <h1>RTK Wave Buoy (local)</h1>
    <p class="muted" id="status">Loading…</p>
  </header>
  <main>
    <div id="map"></div>
    <div class="card" id="metrics"></div>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map("map").setView([32.87, -117.25], 10);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 18 }).addTo(map);
    let marker = null;

    function row(l, v) {
      return `<div class="row"><span>${l}</span><span class="val">${v ?? "—"}</span></div>`;
    }

    async function load() {
      try {
        const res = await fetch("/api/latest?t=" + Date.now());
        const rows = await res.json();
        const d = rows[0];
        if (!d) {
          document.getElementById("status").textContent = "No data — run test_ingest.ps1 or wait for buoy POST";
          return;
        }
        document.getElementById("status").textContent = "Last update: " + (d.received || "—");
        document.getElementById("metrics").innerHTML = [
          row("Device", d.device_id),
          row("Fix", d.fix),
          row("RTK", d.rtk),
          row("Sats", d.sats),
          row("Lat", d.lat != null ? Number(d.lat).toFixed(6) : null),
          row("Lon", d.lon != null ? Number(d.lon).toFixed(6) : null),
          row("Voltage (V)", d.bus_v),
          row("Power (mW)", d.power_mw),
          row("RSSI", d.rssi),
          row("NTRIP", d.ntrip === 1 ? "up" : d.ntrip === 0 ? "down" : null),
        ].join("");
        if (d.lat != null && d.lon != null) {
          const ll = [d.lat, d.lon];
          if (!marker) marker = L.marker(ll).addTo(map);
          else marker.setLatLng(ll);
          map.setView(ll, 12);
        }
      } catch (e) {
        document.getElementById("status").textContent = "Server not reachable — run python server.py";
      }
    }
    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
